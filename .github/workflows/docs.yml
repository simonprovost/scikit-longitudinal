name: Build Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'zensical.toml'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'src/**/*.py'
  pull_request:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'zensical.toml'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'src/**/*.py'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install UV
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - name: Create virtual environment
        run: uv venv
      - name: Install dependencies
        run: uv sync --dev
      - name: Build documentation
        run: uv run zensical build
